<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .login{
            width:400px;
            margin-left: 900px;
            margin-top: -150px;
            border:1px solid grey;
            padding:10px;
        }
        .login>input{
            width:300px;
            padding:15px;
            margin-top:10px;
            border:1px solid lightgrey;
            border-radius: 5px;
        }
        .btn-login{
            width: 320px;
            padding:15px;
            margin-top:15px;
            background-color: #0866FF;
            color:white;
            border-radius: 5px;
            font-weight: 900;
            font-size:15px;
            border:none;
        }
        a{
            margin-left:100px;
            margin-top:500px;
            text-decoration: none;
        }
        .btn-create{
             width: 280px;
            padding:15px;
            margin-left:20px;
            margin-top:15px;
            background-color: #42b72a;
            color:white;
            border-radius: 5px;
            font-weight: 900;
            font-size:15px;
            border:none;
        }
        .hero-h1{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color:#0866FF;
            font-size:60px;
        }
        .fb-logo{
            margin-left:100px;
            margin-top:250px;
        }
    </style>
</head>
<body>
    <div class="fb">
        <div class="fb-logo">
            <h1 class="hero-h1">facebook</h1>
        </div>
        <form action="" class="login">
            <input type="text" name="" id="" placeholder="Enter Email or mobile">
            <input type="password" name="" id="" placeholder="Password">
            <br>
            <button type="submit" class="btn-login">Login</button>
            <br><br>
            <a href="">Forgotten Password</a>
            <hr>
            <button class="btn-create">Create New Account</button>
        </form>
    </div>
</body>
</html>
