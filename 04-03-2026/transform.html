<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />
    <style>

        div{
            height: 100px;
            width: 200px;
            padding:10px;
            border:1px solid black;  
            background-color: powderblue; 
            position: absolute;
            top:0px;
            left:0px;
            animation-duration: 5s;
            animation-iteration-count: infinite;    
        }
       
        @keyframes anim1{
           0%{left:0px;top:0px;background-color: aquamarine;}
           25%{left:400px;top:0px;background-color: red;}
           50%{left: 400px;top:200px;background-color: orange;}
           75%{left:0px;top:200px;background-color: blue;}
           100%{left:0px;top:0px;background-color: yellow;}
        }

    </style>
</head>
<body>
    <div>
        <h1 class="animate__animated animate__hinge animate__infinite">Hello world</h1>
    </div>
</body>
</html>
