<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,tr,td,th{
            border:1px solid black;
            padding:20px;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    
<h1>List of users</h1>
<div id="content"></div>
    <script>

        var str="<table class='table table-bordered'>"
            str+=`<tr><th>sno</th>
                   <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    </tr> `
        fetch("https://jsonplaceholder.typicode.com/users")
        .then((res)=>res.json())
        .then((data)=>{console.log(data)
                data.forEach((user)=>{
                    str+=`<tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.phone}</td></tr>`
                        
                })
                str+="</table>"
                document.getElementById("content").innerHTML=str;



        }
        
    )





    </script>

</body>
</html>
